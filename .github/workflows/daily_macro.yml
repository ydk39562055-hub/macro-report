name: Daily Macro Report

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = KST 07:00 매일
  workflow_dispatch:         # 수동 즉시 실행 버튼

jobs:
  generate-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # reports/ 폴더 git push 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Commit & push report
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions Bot"
          git add reports/latest_report.json
          git diff --staged --quiet && echo "변경 없음" || \
            git commit -m "📊 Macro Report $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')" && \
            git push
